<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测测你的叙事人格 — 雕龙</title>
  <style>
    :root {
      --bg: #fafaf8;
      --bg-secondary: #f4f4f2;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #c0392b;
      --accent-hover: #a93226;
      --border: #e5e5e3;
      --radius: 6px;
      --font: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }

    /* Header */
    .site-header {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .logo { font-weight: 700; font-size: 1.1rem; }
    .logo-en { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; margin-left: 4px; }
    .back-link { margin-left: auto; font-size: 0.85rem; color: var(--text-muted); }

    /* Main */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .header p { font-size: 0.9rem; color: var(--text-muted); }

    /* Progress */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Question */
    .question-card {
      display: none;
    }
    .question-card.active { display: block; }

    .question-meta {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* Options */
    .option {
      display: block;
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      text-align: left;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 10px;
    }
    .option:hover {
      border-color: var(--accent);
      background: white;
    }
    .option.selected {
      border-color: var(--accent);
      background: white;
      color: var(--accent);
      font-weight: 500;
    }

    /* Result */
    .result-card {
      display: none;
      text-align: center;
    }
    .result-card.active { display: block; }

    .result-type {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .result-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .result-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.8;
      text-align: left;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .result-tag {
      font-size: 0.75rem;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
    }
    .result-cta {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 10px 24px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .result-cta:hover { background: var(--accent-hover); color: white; }

    .restart-btn {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .restart-btn:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/tools" class="logo">雕龙 <span class="logo-en">DragonCraft</span></a>
    <a href="/tools" class="back-link">← 返回工具箱</a>
  </header>

  <main>
    <div class="container">
      <div class="header">
        <h1>测测你的叙事人格</h1>
        <p>8道题，发现你的叙事风格类型</p>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div id="questionContainer"></div>

      <div class="result-card" id="resultCard">
        <div class="result-type" id="resultType"></div>
        <div class="result-name" id="resultName"></div>
        <div class="result-tags" id="resultTags"></div>
        <div class="result-desc" id="resultDesc"></div>
        <a href="https://github.com/lj22503/diaolong-skill" target="_blank" class="result-cta">深入学习叙事方法论 →</a>
        <br>
        <span class="restart-btn" onclick="restart()">重新测试</span>
      </div>
    </div>
  </main>

  <script>
    const questions = [
      {
        text: "你准备一场重要演讲，开场你会怎么做？",
        options: [
          { text: "讲一个真实的小故事，让人代入", key: "E" },
          { text: "先抛出一个反直觉的数据或观点", key: "I" },
          { text: "直接说今天要解决的三个问题", key: "S" },
          { text: "用一个有力的金句镇场", key: "N" },
        ]
      },
      {
        text: "你的朋友向你倾诉最近的工作烦恼，你通常会？",
        options: [
          { text: "给他建议：第一步做什么，第二步做什么", key: "S" },
          { text: "给他信心：这种事我也经历过，后来怎么走出来的", key: "E" },
          { text: "帮他分析：这个问题背后是结构性问题，要换个角度", key: "I" },
          { text: "静静听着，让他自己说出来就好了", key: "N" },
        ]
      },
      {
        text: "写一段自我介绍，你会怎么写？",
        options: [
          { text: "讲一个自己经历的关键转折点故事", key: "E" },
          { text: "用几个标签 + 一个成就数字", key: "S" },
          { text: "写一段有深度的价值观宣言", key: "I" },
          { text: "写一句让别人记住的话", key: "N" },
        ]
      },
      {
        text: "看到一个品牌的广告，你最容易被什么打动？",
        options: [
          { text: "普通人的真实故事，感觉说的就是自己", key: "E" },
          { text: "清晰的卖点，一眼就知道产品解决什么问题", key: "S" },
          { text: "有深度的洞察，让人想多看几遍", key: "I" },
          { text: "有意境、有美感，让人过目不忘", key: "N" },
        ]
      },
      {
        text: "团队开会讨论方案，你更倾向于？",
        options: [
          { text: "先让大家各自分享经历，从故事里找灵感", key: "E" },
          { text: "直接讨论：目标是什么，资源有哪些，路径怎么走", key: "S" },
          { text: "先梳理问题结构：我们要解决的核心问题是什么", key: "I" },
          { text: "先定义我们要讲一个什么故事，再看方案是否符合", key: "N" },
        ]
      },
      {
        text: "如果你要向投资人介绍自己的创业项目，你会？",
        options: [
          { text: "讲一个自己亲身经历的问题发现故事", key: "E" },
          { text: "讲清楚市场规模、用户数据、产品进展", key: "S" },
          { text: "从行业结构性变化切入，讲一个大趋势里的机会", key: "I" },
          { text: "抛出一个反共识的核心观点，再论证", key: "N" },
        ]
      },
      {
        text: "你写朋友圈，最在意的是什么？",
        options: [
          { text: "有没有让人想评论的真实故事", key: "E" },
          { text: "信息有没有传递清楚，有没有行动号召", key: "S" },
          { text: "观点够不够独到，有没有思考深度", key: "I" },
          { text: "有没有让人眼前一亮或会心一笑的表达", key: "N" },
        ]
      },
      {
        text: "你看到一篇阅读量很高的文章，通常是因为？",
        options: [
          { text: "故事写得好，让人沉浸进去停不下来", key: "E" },
          { text: "干货足，方法可操作，收藏了就是自己的", key: "S" },
          { text: "分析有深度，读完感觉认知提升了", key: "I" },
          { text: "观点独特，读完想转发并附上自己的评论", key: "N" },
        ]
      },
    ];

    const types = {
      ENFJ: {
        name: "激励型叙事者",
        tags: ["高能量", "共情力强", "擅长激励他人", "情感丰富"],
        desc: "你是天生的激励者。你的叙事充满能量，能够触达人心，让听众产生强烈的情感共鸣。你善于讲故事来激励行动，擅长把愿景讲得动人，让人们愿意跟随。你的弱点是有时候过于追求共鸣感，可能在逻辑严谨性上有所欠缺。在应用场景上，你最适合品牌故事、团队动员、公益筹款这类需要激发情感行动力的场景。"
      },
      ENFP: {
        name: "创意型叙事者",
        tags: ["灵感丰富", "表达生动", "善于隐喻", "富有感染力"],
        desc: "你是故事的魔术师。你的叙事充满灵气，总能找到意想不到的角度，让人眼前一亮。你不走寻常路，善于用隐喻和类比把复杂的事情讲得简单有趣。你是天生的内容创作者，社交媒体是你最舒适的舞台。但要注意的是，你的创意有时候会让听众跟不上，需要在表达结构上再下功夫。在应用场景上，你最适合个人IP打造、产品种草、探索式叙事这类需要创意和惊喜的场景。"
      },
      INFJ: {
        name: "隐喻型叙事者",
        tags: ["洞察深刻", "结构清晰", "善于升华", "有使命感"],
        desc: "你是思想型的叙事者。你不喜欢空话套话，每一段叙事背后都有深思熟虑的结构和真实的洞察。你擅长从现象提炼本质，用隐喻让听众自己顿悟。你的叙事有重量，能够推动真正的认知改变。但要注意的是，你的表达有时候太内敛，听众需要时间才能进入你的语境。在应用场景上，你最适合教育开场、危机公关、深度内容创作这类需要影响认知的场景。"
      },
      INTJ: {
        name: "战略型叙事者",
        tags: ["逻辑严密", "结构清晰", "简洁有力", "说服力强"],
        desc: "你是精准的叙事者。你不喜欢废话，每一段叙事都经过精心设计，逻辑严密、重点突出。你能够在最短的时间内传递最精准的信息，让听众快速建立认知并采取行动。你是天生的商业叙事者，融资Pitch、销售说服是你的天然领域。但要注意的是，你的简洁有时候显得冷硬，在需要温度的场景需要适当调整。在应用场景上，你最适合融资路演、产品发布、商业提案这类高说服要求的场景。"
      },
    };

    let current = 0;
    let answers = [];

    function render() {
      const container = document.getElementById('questionContainer');
      const progressFill = document.getElementById('progressFill');

      if (current < questions.length) {
        const q = questions[current];
        progressFill.style.width = ((current) / questions.length * 100) + '%';

        let html = `<div class="question-card active">
          <div class="question-meta">问题 ${current + 1} / ${questions.length}</div>
          <div class="question-text">${q.text}</div>`;

        q.options.forEach((opt, i) => {
          html += `<button class="option" onclick="select(${i})">${opt.text}</button>`;
        });

        html += `</div>`;
        container.innerHTML = html;
      } else {
        showResult();
      }
    }

    function select(i) {
      answers.push(questions[current].options[i].key);
      current++;
      render();
    }

    function showResult() {
      document.getElementById('questionContainer').innerHTML = '';
      progressFill.style.width = '100%';

      // MBTI scoring
      let e = answers.filter(a => a === 'E').length;
      let n = answers.filter(a => a === 'N').length;
      let f = answers.filter(a => a === 'E' || a === 'N').length;

      let type;
      if (e >= 4) {
        type = e >= 4 && n >= 4 ? 'ENFP' : e >= 4 ? 'ENFJ' : 'ENF';
      } else {
        type = n >= 4 ? 'INTJ' : 'INFJ';
      }

      // fallback: majority of first letter
      const eCount = answers.filter((a, i) => questions[i].options[a === 'E' ? 0 : 1]?.key === 'E').length;
      const nCount = answers.filter((a, i) => ['N', 'I'].includes(answers[i])).length;
      const eScore = answers.filter(a => a === 'E').length;
      const nScore = answers.filter(a => a === 'N').length;
      const iScore = answers.filter(a => a === 'I').length;
      const sScore = answers.filter(a => a === 'S').length;

      // Determine type
      let primary = eScore >= nScore ? (eScore >= iScore ? 'E' : 'I') : (nScore >= iScore ? 'N' : 'I');
      let secondary = eScore >= nScore ? (sScore >= 2 ? 'S' : 'F') : (sScore >= 2 ? 'S' : 'T');
      let finalType = primary + (secondary === 'F' ? 'E' : secondary === 'T' ? 'I' : secondary) + (nScore >= sScore ? 'F' : 'T') + 'J';

      const validTypes = ['ENFJ', 'ENFP', 'INFJ', 'INTJ'];
      if (!validTypes.includes(finalType)) {
        finalType = eScore > nScore ? (eScore > iScore ? 'ENFJ' : 'INTJ') : (nScore > sScore ? 'ENFP' : 'INFJ');
      }
      if (!validTypes.includes(finalType)) finalType = 'INFJ';

      const result = types[finalType];

      document.getElementById('resultType').textContent = finalType;
      document.getElementById('resultName').textContent = result.name;
      document.getElementById('resultDesc').textContent = result.desc;

      let tagsHtml = '';
      result.tags.forEach(t => { tagsHtml += `<span class="result-tag">${t}</span>`; });
      document.getElementById('resultTags').innerHTML = tagsHtml;

      document.getElementById('resultCard').classList.add('active');
    }

    function restart() {
      current = 0;
      answers = [];
      document.getElementById('resultCard').classList.remove('active');
      render();
    }

    render();
  </script>
</body>
</html>
