name: Narrative Quality CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compliance scan
        run: |
          python3 - << 'PYEOF'
          import os, glob, re

          # 真正需要拦截的套话/AI感词汇
          # 注意：所以、因为、因此、从而、于是 是正常语法连接词，不在拦截范围内
          BANNED = [
            '赋能', '抓手', '闭环', '对齐', '底层逻辑',
            '在当今时代', '值得注意的是', '总而言之',
            '换句话说说', '也就是说', '简而言之', '这意味着',
            '进而',
          ]

          issues = []
          for f in glob.glob("chapters/**/*.org", recursive=True):
              c = open(f).read()
              # 移除代码块内容，避免示例代码中的 banned 列表被误报
              import re
              c = re.sub(r'```[\s\S]*?```', '', c)
              c = re.sub(r'`[^`]+`', '', c)
              for w in BANNED:
                  count = c.count(w)
                  if count > 0:
                      issues.append(f"{f}: {w} x{count}")

          if issues:
              print("COMPLIANCE ISSUES FOUND:")
              for i in issues:
                  print(f"  - {i}")
              exit(1)
          else:
              print("All chapter files passed compliance check.")

      - name: Skill structure check
        run: |
          python3 - << 'PYEOF'
          import os, glob

          required_files = {'SKILL.md'}  # changes.md is recommended but optional
          issues = []

          for skill_dir in glob.glob("skills/narrative-*"):
              if not os.path.isdir(skill_dir):
                  continue
              files = set(os.listdir(skill_dir))
              missing = required_files - files
              if missing:
                  issues.append(f"{skill_dir}: missing {missing}")

          if issues:
              print("SKILL STRUCTURE ISSUES:")
              for i in issues:
                  print(f"  - {i}")
              exit(1)
          else:
              print(f"All {len(glob.glob('skills/narrative-*'))} skills have SKILL.md.")

      - name: Case study metadata check
        run: |
          python3 - << 'PYEOF'
          import os, glob

          # 检查是否存在 metadata 格式的元数据字段
          # 有则检查，无则 warn（叙事要素可能在正文中）
          required_keys = ['conflict', 'anchor', 'hook']
          issues = []

          for f in glob.glob("examples/*.md"):
              content = open(f).read()
              # 只检查有明确 metadata 区块的文件
              if '---' in content:
                  missing = [k for k in required_keys if k.lower() not in content.lower()]
                  if missing:
                      issues.append(f"{os.path.basename(f)}: metadata 缺少 '{missing[0]}' (叙事要素可能在正文)")
              # 无 metadata 区块的文件：跳过（正文可能已包含叙事要素）

          if issues:
              print("CASE STUDY METADATA:")
              for i in issues:
                  print(f"  - {i}")
              print("(不影响构建，仅作提示)")
          else:
              print("All case studies metadata present or narrative elements in body.")
          PYEOF