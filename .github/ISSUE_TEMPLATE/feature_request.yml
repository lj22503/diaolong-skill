name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## 提出新功能建议

        在提交之前，请先搜索是否已有类似建议。

  - type: textarea
    id: problem
    attributes:
      label: 解决的痛点是什么？
      placeholder: 描述你想要解决的问题...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你的解决方案
      placeholder: 描述你认为应该如何解决...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      placeholder: 有没有其他解决思路？